server {
	listen 80;
	server_name _;

	# Prevents nginx from prepending scheme+host to redirect URLs,
	# which breaks when Docker remaps ports (e.g. 8081:80)
	absolute_redirect off;

	root /var/www/html;
	index index.html index.htm;

	# Auth endpoints — handled by PHP
	location ~ ^/(login|logout|refresh)(\.php)?$ {
		include fastcgi_params;
		fastcgi_param SCRIPT_FILENAME /app/$1.php;
		fastcgi_pass unix:/run/php/php8.2-fpm.sock;
	}

	# Everything else — auth-gated static files
	location / {
		auth_request /auth;
		auth_request_set $auth_status $upstream_status;

		try_files $uri $uri/ =404;
	}

	# Internal auth check endpoint
	location = /auth {
		internal;
		include fastcgi_params;
		fastcgi_param SCRIPT_FILENAME /app/auth_check.php;
		fastcgi_pass unix:/run/php/php8.2-fpm.sock;
		fastcgi_param HTTP_COOKIE $http_cookie;
	}

	# Redirect 401 to login page
	error_page 401 = @login_redirect;
	location @login_redirect {
		return 302 /login?next=$request_uri;
	}
}
